# 应用默认配置

app:
  name: "flood_decision_agent"
  version: "0.1.0"
  description: "洪水调度决策智能体"
  debug: false

# LLM 配置
llm:
  provider: "kimi"
  model: "moonshot-v1-128k"
  temperature: 0.7
  max_tokens: 8192
  timeout: 60
  retry:
    max_attempts: 3
    backoff_factor: 2

# 日志配置
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/app.log"
  max_bytes: 10485760  # 10MB
  backup_count: 5

# 对话配置
conversation:
  max_history: 50
  context_window: 128000
  session_timeout: 3600  # 1小时

# 管道配置
pipeline:
  max_iterations: 10
  timeout: 300  # 5分钟
  enable_visualization: true
